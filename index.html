<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub Global - Professional AI Directory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #f1f5f9; line-height: 1.6; }
        
        /* Premium Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; }
        .navbar .logo { font-size: 1.5rem; font-weight: 800; color: #3b82f6; letter-spacing: -0.5px; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .navbar ul { display: flex; list-style: none; gap: 25px; }
        .navbar ul li a { color: #94a3b8; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        .navbar ul li a:hover, .navbar ul li a.active { color: #3b82f6; }

        /* Professional Hero Section */
        .hero-section { text-align: center; padding: 60px 20px 40px; background: radial-gradient(circle at top, rgba(59, 130, 246, 0.1) 0%, transparent 70%); }
        .hero-section h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 12px; color: #ffffff; letter-spacing: -1px; }
        .hero-section p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* Modern Search Component */
        .search-container { width: 100%; max-width: 650px; margin: 0 auto 30px; position: relative; }
        .search-container input { width: 100%; padding: 16px 25px 16px 55px; border-radius: 50px; border: 1px solid #334155; background-color: #111827; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .search-container input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1.2rem; }

        /* 25 AI Tools Filter Area */
        .filter-section { max-width: 1200px; margin: 0 auto 35px; padding: 0 20px; text-align: center; }
        .filter-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; margin-bottom: 15px; font-weight: 700; }
        .quick-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; }
        .tag-btn { background-color: #1e293b; color: #94a3b8; border: 1px solid #2d3748; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s ease; }
        .tag-btn.active, .tag-btn:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; border-color: #3b82f6; transform: translateY(-1px); }

        /* Main Grid Area */
        .main-container { max-width: 1300px; margin: 0 auto; padding: 0 20px 60px; }
        .prompt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 25px; }

        /* Professional Card Component */
        .prompt-card { background-color: #111827; border-radius: 16px; overflow: hidden; border: 1px solid #1e293b; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .prompt-card:hover { transform: translateY(-6px); border-color: #3b82f6; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4); }
        
        .card-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; background-color: #151f32; border-bottom: 1px solid #1e293b; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* 25 Tools Individual Color Profiles */
        .badge.chatgpt { background: #10a37f; color: white; }
        .badge.midjourney { background: #6366f1; color: white; }
        .badge.flux { background: #ec4899; color: white; }
        .badge.claude { background: #d97706; color: white; }
        .badge.elevenlabs { background: #06b6d4; color: white; }
        .badge.sora { background: #ef4444; color: white; }
        .badge.runway { background: #8b5cf6; color: white; }
        .badge.stable-diffusion { background: #3b82f6; color: white; }
        .badge.v0 { background: #000000; color: white; border: 1px solid #334155; }
        .badge.canva { background: #7d2ae8; color: white; }

        .category { font-size: 0.75rem; color: #94a3b8; font-weight: 600; background: #1e293b; padding: 3px 8px; border-radius: 6px; }
        .card-img { width: 100%; height: 160px; object-fit: cover; filter: brightness(0.9); transition: 0.3s; }
        .prompt-card:hover .card-img { filter: brightness(1.1); }
        
        .card-body { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .prompt-text-box { font-size: 0.85rem; color: #cbd5e1; background-color: #0b0f19; padding: 12px; border-radius: 10px; border: 1px dashed #334155; flex-grow: 1; min-height: 80px; display: flex; align-items: center; text-align: left; }
        
        /* Action Area */
        .card-footer { padding: 14px 18px; background-color: #151f32; display: flex; gap: 10px; border-top: 1px solid #1e293b; }
        .copy-btn { flex: 2; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; padding: 11px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .copy-btn:hover { background: linear-gradient(135deg, #2563eb, #1e40af); }
        .try-btn { flex: 1; background-color: transparent; color: #94a3b8; border: 1px solid #334155; padding: 11px; border-radius: 8px; font-weight: 600; text-decoration: none; text-align: center; font-size: 0.85rem; transition: 0.2s; }
        .try-btn:hover { background-color: #1e293b; color: #fff; border-color: #64748b; }

        @media (max-width: 768px) { 
            .navbar { flex-direction: column; gap: 15px; padding: 15px; } 
            .hero-section h1 { font-size: 2rem; }
        }
    </style>
</head>
