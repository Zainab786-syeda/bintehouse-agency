<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Upload Content</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="max-width: 600px; margin: 50px auto; background: #111827; padding: 30px; border-radius: 12px; color: white; border: 1px solid #1f2937;">
        <h2>Upload History Article</h2>
        <form action="/add-article" method="POST" enctype="multipart/form-data">
            <div style="margin-bottom: 15px;">
                <label>Article Title:</label><br>
                <input type="text" name="title" style="width:100%; padding:10px; background:#1f2937; color:white; border:1px solid #374151; border-radius:5px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label>Content:</label><br>
                <textarea name="content" rows="6" style="width:100%; padding:10px; background:#1f2937; color:white; border:1px solid #374151; border-radius:5px;" required></textarea>
            </div>
            <div style="margin-bottom: 20px;">
                <label>Select Image:</label><br>
                <input type="file" name="image" accept="image/*" style="color:white;">
            </div>
            <button type="submit" style="background:#38bdf8; color:#0b0f19; padding:12px 25px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">Publish Now</button>
        </form>
    </div>
</body>
</html>
