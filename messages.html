<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BinteChat | Premium Multi-Modal Chat Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; color: #111b21; height: 100vh; display: flex; padding: 20px; }
        .chat-master-container { width: 100%; max-width: 1390px; margin: auto; height: calc(100vh - 40px); background: #fff; border-radius: 12px; display: grid; grid-template-columns: 360px 1fr; box-shadow: 0 6px 18px rgba(0,0,0,0.06); overflow: hidden; border: 1px solid #e9edef; }
        
        .sidebar-contacts-panel { background: #ffffff; border-right: 1px solid #e9edef; display: flex; flex-direction: column; }
        .sidebar-header-node { background: #f0f2f5; padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e9edef; }
        .sidebar-profile { font-weight: 700; font-size: 18px; color: #0070f3; letter-spacing: -0.5px; }
        
        .btn-add-contact-trigger { background: #0070f3; color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-add-contact-trigger:hover { background: #0056b3; }

        .contacts-scroll-feed { flex-grow: 1; overflow-y: auto; background: #fff; }
        .contact-list-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #f0f2f5; transition: background 0.2s; }
        .contact-list-item:hover, .contact-list-item.active-chat { background: #f0f2f5; }
        .avatar-dummy { width: 45px; height: 45px; background: #0070f3; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; text-transform: uppercase; }
        .contact-meta-box { flex-grow: 1; }
        .contact-display-name { font-size: 14px; font-weight: 600; color: #111b21; }
        .contact-phone-subtext { font-size: 12px; color: #64748b; }

        .chat-workspace-panel { background: #efeae2; display: flex; flex-direction: column; position: relative; }
        .chat-active-header { background: #f0f2f5; padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e9edef; }
        
        .messages-scroll-thread { flex-grow: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { max-width: 65%; padding: 8px 14px; border-radius: 8px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-bubble.incoming { background: #ffffff; align-self: flex-start; border-top-left-radius: 0; }
        .msg-bubble.outgoing { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg-timestamp { font-size: 10px; color: #64748b; text-align: right; margin-top: 4px; display: block; }

        .chat-footer-controls-bar { background: #f0f2f5; padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-top: 1px solid #e9edef; }
        .chat-input-field { flex-grow: 1; padding: 10px 16px; border: none; border-radius: 8px; outline: none; font-family: inherit; font-size: 14px; background: white; }
        .btn-send-message { background: #0070f3; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
        .btn-send-message:active { transform: scale(0.9); }
        
        .video-call-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.95); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .video-wrapper { position: relative; border-radius: 16px; overflow: hidden; width: 45%; max-width: 500px; background: #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .video-wrapper canvas, .video-wrapper video { width: 100%; height: auto; display: block; }
        .video-filters-bar { background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 30px; color: white; font-size: 12px; display: flex; gap: 15px; margin-bottom: 20px; backdrop-filter: blur(10px); }

        .contact-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; display: none; backdrop-filter: blur(4px); }
        .contact-card-form { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .contact-card-form h3 { font-size: 16px; font-weight: 700; margin-bottom: 15px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 13px; margin-bottom: 12px; outline: none; }
        .form-input:focus { border-color: #0070f3; }
        .modal-action-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 5px; }
        .btn-modal-close { background: #f1f5f9; color: #475569; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-modal-save { background: #0070f3; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-master-container">
        <aside class="sidebar-contacts-panel">
            <div class="sidebar-header-node">
                <span class="sidebar-profile">BinteChat</span>
                <button class="btn-add-contact-trigger" onclick="document.getElementById('contact-modal-portal').style.display='flex'">+ Add Member</button>
            </div>
            
            <div class="contacts-scroll-feed" id="contacts-list-target-node">
                <div class="contact-list-item active-chat" onclick="switchActiveUser('Zainab Zahra', '+92 300 1234567')">
                    <div class="avatar-dummy">ZZ</div>
                    <div class="contact-meta-box">
                        <div class="contact-display-name">Zainab Zahra</div>
                        <div class="contact-phone-subtext">+92 300 1234567</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-workspace-panel">
            <div class="chat-active-header">
                <div class="avatar-dummy" id="header-avatar">ZZ</div>
                <div style="flex-grow:1;">
                    <strong id="header-name">Zainab Zahra</strong>
                    <p style="font-size:12px; color:#64748b;" id="header-phone">+92 300 1234567</p>
                </div>
                <button style="background:#10b981; color:white; border:none; padding:8px 16px; border-radius:8px; font-weight:600; cursor:pointer;" onclick="startVideoCallModule()">📹 BinteChat AI Call</button>
            </div>

            <div class="messages-scroll-thread" id="chat-thread-box">
                <div class="msg-bubble incoming">
                    Assalam-o-Alaikum! Welcome to BinteChat advance secure console. Add network nodes or initialize video stream modules safely.
                    <span class="msg-timestamp">09:40 AM</span>
                </div>
            </div>

            <div class="chat-footer-controls-bar">
                <input type="text" id="msg-input" class="chat-input-field" placeholder="Write a secure message on BinteChat..." onkeypress="handleInputKeyStroke(event)">
                <button class="btn-send-message" onclick="sendMessageDataPacket()">➔</button>
            </div>
        </main>
    </div>

    <div class="contact-modal-overlay" id="contact-modal-portal">
        <div class="contact-card-form">
            <h3>Add New Chat Contact</h3>
            <input type="text" id="modal-name" class="form-input" placeholder="Enter Full Name" required>
            <input type="text" id="modal-phone" class="form-input" placeholder="Enter Contact Number" required>
            
            <div class="modal-action-buttons">
                <button class="btn-modal-close" onclick="document.getElementById('contact-modal-portal').style.display='none'">Cancel</button>
                <button class="btn-modal-save" onclick="saveContactRecord()">Save Member</button>
            </div>
        </div>
    </div>

    <div class="video-call-overlay hidden" id="video-overlay-pane">
        <div class="video-filters-bar">
            <span>✨ AI Real-Time Skin Filter:</span>
            <label><input type="checkbox" id="f-smooth" checked> BinteChat Smooth Glow</label>
        </div>
        <div class="video-wrapper">
            <video id="hardware-video" autoplay playsinline muted class="hidden"></video>
            <canvas id="filter-canvas"></canvas>
        </div>
        <button style="background:#ef4444; border:none; color:white; padding:12px 30px; border-radius:30px; margin-top:20px; font-weight:600; cursor:pointer;" onclick="shutDownVideoCallModule()">Disconnect Call</button>
    </div>

    <script>
        let videoStream = null;
        let animId = null;

        function saveContactRecord() {
            const name = document.getElementById('modal-name').value.trim();
            const phone = document.getElementById('modal-phone').value.trim();
            if(!name || !phone) {
                alert("Please complete all configuration entries.");
                return;
            }
            const list = document.getElementById('contacts-list-target-node');
            const row = document.createElement('div');
            row.className = 'contact-list-item';
            
            const safeNameStr = name.replace(/'/g, "\\'");
            const safePhoneStr = phone.replace(/'/g, "\\'");
            row.setAttribute('onclick', `switchActiveUser('${safeNameStr}', '${safePhoneStr}')`);
            
            const initials = name.split(" ").map(n => n[0]).join("").substring(0, 2).toUpperCase();
            row.innerHTML = `
                <div class="avatar-dummy">${initials}</div>
                <div class="contact-meta-box">
                    <div class="contact-display-name">${name}</div>
                    <div class="contact-phone-subtext">${phone}</div>
                </div>
            `;
            list.appendChild(row);
            document.getElementById('contact-modal-portal').style.display='none';
            
            // Clean fields
            document.getElementById('modal-name').value = "";
            document.getElementById('modal-phone').value = "";
            
            alert(`Mubarak ho! Member "${name}" linked to BinteChat structure arrays.`);
        }

        function switchActiveUser(name, phone) {
            const itemsList = document.querySelectorAll('.contact-list-item');
            itemsList.forEach(item => item.classList.remove('active-chat'));
            
            // Set current target styling if event comes from click
            if(event && event.currentTarget) {
                event.currentTarget.classList.add('active-chat');
            }

            document.getElementById('header-name').innerText = name;
            document.getElementById('header-phone').innerText = phone;
            document.getElementById('header-avatar').innerText = name.split(" ").map(n => n[0]).join("").substring(0, 2).toUpperCase();
            
            const box = document.getElementById('chat-thread-box');
            box.innerHTML = `
                <div class="msg-bubble incoming">
                    This is the start of your encrypted secure chat pipeline logs stream record history with <strong>${name}</strong> on BinteChat.
                    <span class="msg-timestamp">Just Now</span>
                </div>
            `;
        }

        function sendMessageDataPacket() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            
            const box = document.getElementById('chat-thread-box');
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const b = document.createElement('div');
            b.className = 'msg-bubble outgoing';
            b.innerHTML = `${text} <span class="msg-timestamp">${timeStr}</span>`;
            box.appendChild(b);
            input.value = "";
            box.scrollTop = box.scrollHeight;

            setTimeout(() => {
                const automatedResponseBubble = document.createElement('div');
                automatedResponseBubble.className = 'msg-bubble incoming';
                automatedResponseBubble.innerHTML = `Received your transmission matrix packet. BinteChat AI server synchronization pipelines are active. <span class="msg-timestamp">${timeStr}</span>`;
                box.appendChild(automatedResponseBubble);
                box.scrollTop = box.scrollHeight;
            }, 1200);
        }

        function handleInputKeyStroke(event) {
            if (event.key === 'Enter') {
                sendMessageDataPacket();
            }
        }

        function startVideoCallModule() {
            document.getElementById('video-overlay-pane').classList.remove('hidden');
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                videoStream = s;
                const v = document.getElementById('hardware-video');
                v.srcObject = s;
                processCallCanvasStream();
            }).catch(err => {
                alert("Camera hardware access denied or unavailable.");
                document.getElementById('video-overlay-pane').classList.add('hidden');
            });
        }

        function processCallCanvasStream() {
            const v = document.getElementById('hardware-video');
            const c = document.getElementById('filter-canvas');
            const ctx = c.getContext('2d');
            function draw() {
                if(v.paused || v.ended) return;
                if(c.width !== v.videoWidth) { c.width = v.videoWidth || 640; c.height = v.videoHeight || 480; }
                ctx.drawImage(v, 0, 0, c.width, c.height);
                let imgData = ctx.getImageData(0,0,c.width,c.height);
                let d = imgData.data;
                if(document.getElementById('f-smooth').checked) {
                    for(let i=0; i<d.length; i+=4) {
                        d[i] = Math.min(255, d[i] + 20); 
                        d[i+1] = Math.min(255, d[i+1] + 20); 
                        d[i+2] = Math.min(255, d[i+2] + 25);
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                animId = requestAnimationFrame(draw);
            }
            v.addEventListener('play', draw);
            if(!v.paused) draw();
        }

        function shutDownVideoCallModule() {
            document.getElementById('video-overlay-pane').classList.add('hidden');
            if(animId) cancelAnimationFrame(animId);
            if(videoStream) videoStream.getTracks().forEach(t => t.stop());
        }
    </script>
</body>
</html>
