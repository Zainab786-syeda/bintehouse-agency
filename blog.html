<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History Blog - bintehouse</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .blog-post { background: #111827; border: 1px solid #1f2937; padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        .blog-post h2 { color: #38bdf8; margin-top: 0; }
        .blog-post p { color: #cbd5e1; line-height: 1.6; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">SmartAI<span>Hub</span></a>
    </header>

    <div class="blog-container">
        <h1 style="color: white; margin-bottom: 30px;">Latest History Articles</h1>
        
        <!-- یہاں ڈیٹا بیس سے آنے والے آرٹیکلز ظاہر ہوں گے -->
        <div id="blog-posts-container">
            <p style="color: #6b7280;">Loading articles...</p>
        </div>
    </div>

    <script>
        // پائیتھون API سے ڈیٹا منگوانے کا فنکشن
        async function loadArticles() {
            try {
                const response = await fetch('/api/articles');
                const articles = await response.json();
                const container = document.getElementById('blog-posts-container');
                
                if (articles.length === 0) {
                    container.innerHTML = "<p style='color: #6b7280;'>No articles found.</p>";
                    return;
                }

                container.innerHTML = ''; // لوڈنگ میسج صاف کریں
                articles.forEach(article => {
                    const postDiv = document.createElement('div');
                    postDiv.className = 'blog-post';
                    postDiv.innerHTML = `
                        <h2>${article.title}</h2>
                        <p>${article.content}</p>
                    `;
                    container.appendChild(postDiv);
                });
            } catch (error) {
                console.error('Error fetching articles:', error);
            }
        }

        // پیج لوڈ ہوتے ہی فنکشن چلائیں
        window.onload = loadArticles;
    </script>
</body>
</html>
