<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Bintehouse Agency</title>
    <!-- Tailwind CSS for Modern Styling -->
    <script src="https://tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Futuristic Dark Theme */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .blog-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .blog-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <!-- Header / Hero Section -->
    <header class="py-16 text-center relative overflow-hidden bg-slate-900 border-b border-slate-800">
        <div class="absolute inset-0 bg-gradient-to-r reduction from-blue-900/20 to-purple-900/20 pointer-events-none"></div>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent mb-4">
            Bintehouse Agency Blog
        </h1>
        <p class="text-slate-400 text-lg max-w-xl mx-auto px-4">
            Explore our latest historical articles, agency updates, and professional content insights.
        </p>
    </header>

    <!-- Main Blog Grid Section -->
    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold mb-8 flex items-center gap-2">
            <span class="w-3 h-8 bg-sky-500 rounded-full inline-block"></span>
            Latest History & Agency Articles
        </h2>

        <!-- Articles Container -->
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading State -->
            <div id="loading" class="col-span-full text-center py-12 text-slate-400 text-lg animate-pulse">
                ⏳ Fetching dynamic insights, please wait...
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-8 text-slate-500 text-sm border-t border-slate-800 mt-20">
        &copy; 2026 Bintehouse Agency. All rights reserved.
    </footer>

    <!-- JavaScript to Fetch Data from Flask API -->
    <script>
        async function fetchArticles() {
            try {
                const response = await fetch('/api/articles');
                const articles = await response.json();
                
                const container = document.getElementById('articles-container');
                const loadingElement = document.getElementById('loading');
                
                // Loading ختم کریں
                if (loadingElement) loadingElement.remove();

                if (articles.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 text-slate-500">
                            No articles published yet. Check back soon!
                        </div>`;
                    return;
                }

                // آرٹیکلز کو کارڈز کی شکل میں ڈسپلے کریں
                container.innerHTML = articles.map(article => {
                    // اگر تصویر موجود ہے تو اس کا راستہ سیٹ کریں، ورنہ ڈیفالٹ تصویر دکھائیں
                    const imageSrc = article.image_path ? `/static/uploads/${article.image_path}` : 'https://unsplash.com';
                    
                    return `
                        <article class="blog-card rounded-2xl overflow-hidden flex flex-col">
                            <div class="h-48 overflow-hidden bg-slate-800 relative">
                                <img src="${imageSrc}" alt="${article.title}" class="w-full h-full object-cover">
                                <span class="absolute top-4 left-4 bg-sky-500/90 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                                    History
                                </span>
                            </div>
                            <div class="p-6 flex-1 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-xl font-bold mb-3 text-white line-clamp-2 hover:text-sky-400 transition-colors">
                                        ${article.title}
                                    </h3>
                                    <p class="text-slate-400 text-sm line-clamp-3 mb-4 leading-relaxed">
                                        ${article.content}
                                    </p>
                                </div>
                                <div class="flex items-center justify-between pt-4 border-t border-slate-800">
                                    <span class="text-xs text-slate-500">Just Now</span>
                                    <a href="#" class="text-sky-400 text-sm font-semibold hover:underline flex items-center gap-1">
                                        Read More <span>&rarr;</span>
                                    </a>
                                </div>
                            </div>
                        </article>
                    `;
                }).join('');

            } catch (error) {
                console.error("Error fetching articles:", error);
                document.getElementById('articles-container').innerHTML = `
                    <div class="col-span-full text-center py-12 text-red-400">
                        Failed to load articles. Please ensure your backend is running.
                    </div>`;
            }
        }

        // پیج لوڈ ہوتے ہی فنکشن چلائیں
        document.addEventListener('DOMContentLoaded', fetchArticles);
    </script>
</body>
</html>
