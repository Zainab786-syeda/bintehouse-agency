<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog - SmartAI Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">SmartAI<span>Hub</span></a>
    </header>

    <div style="max-width: 900px; margin: 40px auto; padding: 0 20px;">
        <h1 style="color: white; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; margin-bottom: 30px;">Latest History Articles</h1>
        
        <div id="blog-posts-container">
            <p style="color: #9ca3af;">Loading articles...</p>
        </div>
    </div>

    <script>
        // ڈیٹا بیس سے ڈیٹا فیچ (fetch) کرنا
        fetch('/api/articles')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('blog-posts-container');
                container.innerHTML = ''; 

                if (data.length === 0) {
                    container.innerHTML = '<p style="color: #9ca3af;">No articles found yet.</p>';
                    return;
                }

                data.forEach(article => {
                    // اگر تصویر موجود ہے تو اسے دکھائیں
                    const imageTag = article.image_path ? `<img src="/static/uploads/${article.image_path}" style="width:100%; border-radius:10px; margin-bottom:20px;">` : '';
                    
                    const postHTML = `
                        <div style="background:#111827; border:1px solid #1f2937; padding:30px; border-radius:15px; margin-bottom:30px;">
                            ${imageTag}
                            <h2 style="color:#ffffff; margin-bottom:15px;">${article.title}</h2>
                            <p style="color:#cbd5e1; line-height:1.7;">${article.content}</p>
                        </div>`;
                    container.innerHTML += postHTML;
                });
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>
</html>
